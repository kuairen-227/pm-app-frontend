name: Frontend Quality Check

on:
  pull_request:

jobs:
  quality:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: package-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Lint (Biome)
        run: pnpm check

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
