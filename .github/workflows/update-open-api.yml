name: Update OpenAPI Types

on:
  repository_dispatch:
    types: [backend-updated]

permissions:
  contents: write
  pull-requests:  write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download swagger artifact
        run: |
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/kuairen-227/pm-app-backend/actions/runs \
            | jq '.workflow_runs[0].id')

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/kuairen-227/pm-app-backend/actions/runs/$RUN_ID/artifacts \
            -o artifacts.json

          ARTIFACT_ID=$(jq '.artifacts[] | select(.name=="swagger") | .id' artifacts.json)

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/kuairen-227/pm-app-backend/actions/artifacts/$ARTIFACT_ID/zip \
            -o swagger.zip

          unzip swagger.zip

      - name: Generate types
        run: |
          npx openapi-typescript swagger.json -o src/shared/types/open-api.ts

      - name: Cleanup
        run: rm artifacts.json swagger.json swagger.zip

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: update-openapi-types
          base: main
          commit-message: "build(api): :label: update openapi types"
          title: "build(api): :label: update OpenAPI types"
          body: |
            This PR updates OpenAPI types generated from backend swagger.

            ## Changes
            - Regenerated `open-api.ts`

            ## Source
            pm-app-backend swagger artifact

            ---
            🤖 Auto-generated by GitHub Actions
          labels: |
            open-api
          assignees: kuairen-227
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
