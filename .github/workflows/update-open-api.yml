name: Update OpenAPI Types

on:
  repository_dispatch:
    types: [backend-updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      PR_BRANCH: update-openapi-types-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Download swagger artifact
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/kuairen-227/pm-app-backend/actions/artifacts \
            -o artifacts.json

          ARTIFACT_ID=$(jq '.artifacts
            | map(select(.name=="swagger"))
            | sort_by(.created_at)
            | reverse
            | .[0].id' artifacts.json)

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/kuairen-227/pm-app-backend/actions/artifacts/$ARTIFACT_ID/zip \
            -o swagger.zip

          unzip -o swagger.zip

      - name: Generate types
        run: npx openapi-typescript swagger.json -o src/shared/types/open-api.ts

      - name: Cleanup
        run: rm artifacts.json swagger.json swagger.zip

      - name: Set backend commit info
        run: |
          echo "BACKEND_COMMIT_SHA=${{ github.event.client_payload.commit_sha }}" >> $GITHUB_ENV
          echo "BACKEND_COMMIT_MSG=${{ github.event.client_payload.commit_message }}" >> $GITHUB_ENV

      - name: Check for changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/shared/types/open-api.ts
          if git diff --cached --quiet; then
            echo "No changes detected, skipping PR"
            exit 0
          fi

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ env.PR_BRANCH }}
          base: main
          commit-message: "build(api): :label: update openapi types"
          title: "build(api): :label: update OpenAPI types — ${{ env.BACKEND_COMMIT_MSG }}"
          body: |
            This PR updates OpenAPI types generated from backend swagger.

            ## Source
            Commit: ${{ env.BACKEND_COMMIT_SHA }}

            ---
            🤖 Auto-generated by GitHub Actions
          labels: open-api
          assignees: kuairen-227
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
